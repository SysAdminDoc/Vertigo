name: Build & Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.4.0). Leave blank to build artifacts only."
        required: false
        default: ""
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.os-label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            os-label: Windows x64
            artifact-name: ReelForge-windows-x64.zip
            exe: dist/ReelForge.exe
          - os: macos-14
            os-label: macOS arm64
            artifact-name: ReelForge-macos-arm64.zip
            exe: dist/ReelForge.app
          - os: ubuntu-latest
            os-label: Linux x64
            artifact-name: ReelForge-linux-x64.tar.gz
            exe: dist/ReelForge

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      # FFmpeg is only needed to run tests / the spec's probe; end-users must
      # install FFmpeg themselves.
      - name: Install FFmpeg (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install FFmpeg (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg

      - name: Install FFmpeg (Windows)
        if: runner.os == 'Windows'
        run: choco install -y --no-progress ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "pyinstaller>=6.8"

      - name: Smoke-import core modules
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          python -c "import sys; sys.path.insert(0, '.'); from core.probe import probe; from core.presets import PRESETS; from core.reframe import build_plan, ReframeMode; from core.encode import EncodeJob; print('core OK')"

      - name: Build with PyInstaller
        run: pyinstaller --clean reelforge.spec

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd dist
          7z a -tzip ../ReelForge-windows-x64.zip ReelForge.exe
          cd ..
          ls -la ReelForge-windows-x64.zip

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          cd dist
          ditto -c -k --sequesterRsrc --keepParent ReelForge.app ../ReelForge-macos-arm64.zip
          cd ..
          ls -la ReelForge-macos-arm64.zip

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          cd dist
          tar -czf ../ReelForge-linux-x64.tar.gz ReelForge
          cd ..
          ls -la ReelForge-linux-x64.tar.gz

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-name }}
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.tag != '')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Flatten artifact layout
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.zip" -o -name "*.tar.gz" \) -exec cp {} release/ \;
          ls -la release/

      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.name }}"
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --title "$TAG" \
              --notes "Automated build from $GITHUB_SHA" \
              --draft
          fi

      - name: Upload binaries (clobber existing)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.tag.outputs.name }}" release/* --clobber
